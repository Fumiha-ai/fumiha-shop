<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">BGM 詳細 — ふみは BGM SHOP</title>
<!-- OGP (JS で上書き) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="ふみは BGM SHOP">
<meta id="og-title"       property="og:title"       content="ふみは BGM SHOP">
<meta id="og-description" property="og:description"  content="ロイヤリティフリーBGM販売">
<meta id="og-image"       property="og:image"        content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #4A6CF7;
    --accent-light: #EEF1FE;
    --bg: #F7F8FC;
    --bg2: #FFFFFF;
    --border: #E4E7F0;
    --text: #1A1C2A;
    --muted: #6B7080;
    --radius: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ── Nav ── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--accent); }
  .nav-brand {
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 15px;
    color: var(--text);
    text-decoration: none;
  }

  /* ── Hero ── */
  .hero {
    max-width: 960px;
    margin: 48px auto 0;
    padding: 0 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: start;
  }
  @media(max-width:720px) {
    .hero { grid-template-columns: 1fr; gap: 28px; padding: 0 20px; }
  }

  /* Jacket */
  .jacket-wrap {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 16/9;
    background: var(--jacket-color, #2a2d3e);
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  }
  .jacket-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .jacket-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    opacity: 0.55;
  }
  .jacket-wrap img.loaded + .jacket-placeholder { display: none; }

  /* Info */
  .info { display: flex; flex-direction: column; gap: 0; }

  .sale-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
    width: fit-content;
  }
  .sale-badge.one-of-a-kind { background:#FFF3E0; color:#C25F00; border:1px solid #FFD59E; }
  .sale-badge.regular        { background:var(--accent-light); color:var(--accent); border:1px solid #C5CEFB; }
  .sale-badge.free           { background:#EDFAF3; color:#1A7A47; border:1px solid #9DE3BF; }

  .song-title {
    font-family: 'Dela Gothic One', sans-serif;
    font-size: clamp(28px, 5vw, 46px);
    line-height: 1.1;
    margin-bottom: 14px;
  }
  .song-desc {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 24px;
  }

  /* Player */
  .player-box {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 40px;
    margin-bottom: 14px;
    cursor: pointer;
  }
  .wave-bar {
    flex: 1;
    border-radius: 3px;
    background: var(--border);
    transition: background 0.15s, height 0.15s;
  }
  .player-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .play-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
    transition: transform 0.15s, opacity 0.15s;
  }
  .play-btn:hover { transform: scale(1.1); opacity: 0.9; }
  .player-time { font-size: 12px; color: var(--muted); flex: 1; }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
  }
  .volume-icon { font-size: 14px; cursor: pointer; width: 20px; text-align: center; flex-shrink: 0; }
  .volume-slider {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 4px;
    border-radius: 999px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .volume-slider::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
  }
  .volume-num { font-size: 11px; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0; }
  audio { display: none; }

  /* License pills */
  .license-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .lic-pill {
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 12px;
    background: var(--bg);
  }

  /* Price + Buy */
  .buy-area {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 20px;
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
  }
  .price {
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 32px;
    line-height: 1;
  }
  .price span { font-size: 14px; font-family: 'Noto Sans JP', sans-serif; color: var(--muted); }
  .buy-btn {
    padding: 13px 28px;
    border-radius: 999px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    letter-spacing: 0.5px;
    background: var(--accent);
    color: #fff;
    transition: transform 0.15s, opacity 0.15s;
    white-space: nowrap;
  }
  .buy-btn:hover { opacity: 0.85; transform: scale(1.03); }
  .buy-btn.free-btn { background: #1A7A47; }
  .buy-btn:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; transform: none; }
  .sold-out-badge {
    font-size: 12px;
    font-weight: 700;
    color: #D94545;
    border: 1px solid #D94545;
    border-radius: 6px;
    padding: 4px 10px;
  }

  /* ── License table ── */
  .detail-section {
    max-width: 960px;
    margin: 56px auto 0;
    padding: 0 40px;
  }
  @media(max-width:720px) { .detail-section { padding: 0 20px; } }

  .section-title {
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 20px;
    margin-bottom: 18px;
  }
  .license-list {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .license-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .license-item:last-child { border-bottom: none; }
  .ok { color: #2BA05C; font-weight: 700; font-size: 16px; flex-shrink: 0; }
  .ng { color: #D94545; font-weight: 700; font-size: 16px; flex-shrink: 0; }

  /* ── Other songs ── */
  .other-section {
    max-width: 960px;
    margin: 56px auto 80px;
    padding: 0 40px;
  }
  @media(max-width:720px) { .other-section { padding: 0 20px; } }

  .other-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }
  .other-card {
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.2s, box-shadow 0.2s;
    display: block;
  }
  .other-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(74,108,247,0.12); }
  .other-jacket {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
  }
  .other-jacket img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }
  .other-card:hover .other-jacket img { transform: scale(1.05); }
  .other-jacket .jacket-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    opacity: 0.6;
  }
  .other-jacket img.loaded + .jacket-placeholder { display: none; }
  .other-body { padding: 14px; }
  .other-title { font-family: 'Dela Gothic One', sans-serif; font-size: 15px; margin-bottom: 4px; }
  .other-type {
    font-size: 11px;
    font-weight: 700;
    border-radius: 4px;
    padding: 2px 8px;
    display: inline-block;
  }
  .other-type.one-of-a-kind { background:#FFF3E0; color:#C25F00; }
  .other-type.regular        { background:var(--accent-light); color:var(--accent); }
  .other-type.free           { background:#EDFAF3; color:#1A7A47; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }

  /* ── Error ── */
  .error-wrap {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 40px;
  }
  .error-wrap h2 { font-family: 'Dela Gothic One', sans-serif; font-size: 28px; }
  .error-wrap p  { color: var(--muted); }

  @keyframes floatUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  .hero { animation: floatUp 0.4s ease both; }
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <a class="back-btn" href="bgm-shop.html">← 曲一覧へ戻る</a>
  <a class="nav-brand" href="bgm-shop.html">ふみは BGM SHOP</a>
</nav>

<!-- 動的コンテンツ -->
<div id="main-content"></div>

<footer>
  <p>© 2025 ふみは BGM SHOP — All BGM produced with Suno AI</p>
</footer>

<script src="songs.js"></script>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const id     = params.get('id');
  const song   = SONGS.find(s => s.id === id);
  const main   = document.getElementById('main-content');

  /* ── 曲が見つからない ── */
  if (!song) {
    main.innerHTML = `
      <div class="error-wrap">
        <h2>曲が見つかりません</h2>
        <p>URLが正しいかご確認ください。</p>
        <a href="bgm-shop.html" style="color:var(--accent);font-weight:700;">← 曲一覧へ戻る</a>
      </div>`;
    return;
  }

  /* ── ページタイトル / OGP ── */
  document.getElementById('page-title').textContent       = `${song.title} — ふみは BGM SHOP`;
  document.getElementById('og-title').content             = `${song.title} — ふみは BGM SHOP`;
  document.getElementById('og-description').content       = song.description;
  if (song.jacket) document.getElementById('og-image').content = song.jacket;

  /* ── バッジテキスト ── */
  const BADGE = {
    'one-of-a-kind': '一品物 · 限定1点',
    'regular':        '通常販売',
    'free':           'フリー · 無料DL',
  };
  const isFree  = song.type === 'free';
  const priceHtml = isFree
    ? '¥0 <span>/ 無料</span>'
    : `¥${song.price.toLocaleString()} <span>/ 1曲</span>`;
  const buyClass = isFree ? 'buy-btn free-btn' : 'buy-btn';
  const buyText  = isFree ? '無料DL' : '準備中';
  const licenses = song.licenses.map(l => `<span class="lic-pill">${l}</span>`).join('');

  /* ── メインHTML ── */
  main.innerHTML = `
    <div class="hero">
      <!-- Jacket -->
      <div class="jacket-wrap" style="--jacket-color:${song.jacketGradient}">
        <img src="${song.jacket}" alt="${song.title}" onload="this.classList.add('loaded')" onerror="this.style.display='none'">
        <div class="jacket-placeholder">${song.jacketEmoji}</div>
      </div>

      <!-- Info -->
      <div class="info">
        <div class="sale-badge ${song.type}">${BADGE[song.type]}</div>
        <div class="song-title">${song.title}</div>
        <div class="song-desc">${song.description}</div>

        <!-- Player -->
        <div class="player-box">
          <div class="waveform" id="wf" onclick="togglePlay()"></div>
          <div class="player-controls">
            <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
            <div class="player-time" id="player-time">${song.duration}</div>
          </div>
          <div class="volume-row">
            <span class="volume-icon" id="vol-icon" onclick="toggleMute()">🔊</span>
            <input class="volume-slider" id="vol-slider" type="range" min="0" max="100" value="30"
              oninput="setVolume()">
            <span class="volume-num" id="vol-num">30</span>
          </div>
        </div>

        <!-- License pills -->
        <div class="license-pills">${licenses}</div>

        <!-- Buy -->
        <div class="buy-area">
          <div class="price">${priceHtml}</div>
          <button class="${buyClass}" id="buy-btn" disabled>${buyText}</button>
        </div>

        <audio id="player" src="${song.audio}"></audio>
      </div>
    </div>

    <!-- License table -->
    <div class="detail-section">
      <div class="section-title">ライセンス</div>
      <div class="license-list">
        <div class="license-item"><span class="ok">✓</span>個人使用・非商用</div>
        <div class="license-item"><span class="ok">✓</span>YouTube・配信収益化</div>
        <div class="license-item"><span class="ok">✓</span>SNS投稿・動画編集</div>
        <div class="license-item"><span class="ok">✓</span>ゲーム・アプリ組み込み（ゲーム用途のみ）</div>
        <div class="license-item"><span class="ok">✓</span>商用広告・プロモ動画（ビジネス用途のみ）</div>
        <div class="license-item"><span class="ng">×</span>再配布・再販売は禁止</div>
      </div>
    </div>`;

  /* ── 他の曲 ── */
  const others = SONGS.filter(s => s.id !== song.id);
  if (others.length > 0) {
    const TYPE_LABEL = { 'one-of-a-kind': '一品物', 'regular': '通常販売', 'free': '無料' };
    const cards = others.map(s => `
      <a class="other-card" href="song.html?id=${s.id}">
        <div class="other-jacket" style="background:${s.jacketGradient}">
          <img src="${s.jacket}" alt="${s.title}" onload="this.classList.add('loaded')" onerror="this.style.display='none'">
          <div class="jacket-placeholder">${s.jacketEmoji}</div>
        </div>
        <div class="other-body">
          <div class="other-title">${s.title}</div>
          <span class="other-type ${s.type}">${TYPE_LABEL[s.type]}</span>
        </div>
      </a>`).join('');

    const section = document.createElement('div');
    section.className = 'other-section';
    section.innerHTML = `<div class="section-title" style="margin-bottom:18px">他の曲を見る</div>
      <div class="other-grid">${cards}</div>`;
    main.appendChild(section);
  }

  /* ── Player logic ── */
  const audio   = document.getElementById('player');
  const playBtn = document.getElementById('play-btn');
  const timeEl  = document.getElementById('player-time');
  const wf      = document.getElementById('wf');

  // Waveform bars
  for (let i = 0; i < 48; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.style.height = (8 + Math.random() * 24) + 'px';
    wf.appendChild(bar);
  }

  let animTimer = null;
  function animateBars(playing) {
    if (playing) {
      animTimer = setInterval(() => {
        wf.querySelectorAll('.wave-bar').forEach(b => {
          b.style.height = (8 + Math.random() * 24) + 'px';
          b.style.background = 'var(--accent)';
        });
      }, 120);
    } else {
      clearInterval(animTimer);
      wf.querySelectorAll('.wave-bar').forEach(b => {
        b.style.height = '';
        b.style.background = 'var(--border)';
      });
    }
  }

  function fmtTime(sec) {
    if (!sec || isNaN(sec)) return '--:--';
    return Math.floor(sec / 60) + ':' + String(Math.floor(sec % 60)).padStart(2, '0');
  }

  audio.addEventListener('loadedmetadata', () => {
    timeEl.textContent = fmtTime(audio.duration);
  });
  audio.addEventListener('timeupdate', () => {
    if (audio.duration) timeEl.textContent = fmtTime(audio.duration - audio.currentTime);
  });
  audio.addEventListener('ended', () => {
    playBtn.textContent = '▶';
    animateBars(false);
    audio.currentTime = 0;
    if (audio.duration) timeEl.textContent = fmtTime(audio.duration);
  });

  window.togglePlay = function () {
    if (playBtn.textContent === '▶') {
      playBtn.textContent = '⏸';
      audio.play();
      animateBars(true);
    } else {
      playBtn.textContent = '▶';
      audio.pause();
      animateBars(false);
    }
  };

  // Volume
  const volSlider = document.getElementById('vol-slider');
  const volIcon   = document.getElementById('vol-icon');
  const volNum    = document.getElementById('vol-num');
  audio.volume = 0.3;
  volSlider.style.background = 'linear-gradient(to right, var(--accent) 30%, var(--border) 30%)';

  window.setVolume = function () {
    const val = parseInt(volSlider.value);
    audio.volume = val / 100;
    volNum.textContent = val;
    volIcon.textContent = val === 0 ? '🔇' : val < 50 ? '🔉' : '🔊';
    volSlider.style.background =
      `linear-gradient(to right, var(--accent) ${val}%, var(--border) ${val}%)`;
  };

  window.toggleMute = function () {
    if (audio.volume > 0) {
      volSlider.dataset.prev = volSlider.value;
      audio.volume = 0;
      volSlider.value = 0;
      volIcon.textContent = '🔇';
      volNum.textContent = '0';
      volSlider.style.background = 'linear-gradient(to right, var(--accent) 0%, var(--border) 0%)';
    } else {
      const prev = parseInt(volSlider.dataset.prev) || 50;
      audio.volume = prev / 100;
      volSlider.value = prev;
      volNum.textContent = prev;
      volIcon.textContent = prev < 50 ? '🔉' : '🔊';
      volSlider.style.background =
        `linear-gradient(to right, var(--accent) ${prev}%, var(--border) ${prev}%)`;
    }
  };

  /* ── 購入ボタン設定（localStorage + Netlify function） ── */
  function applyBuySettings(saved) {
    const data    = saved[song.id] || {};
    const url     = data.boothUrl || '';
    const soldOut = data.soldOut  || false;
    const btn     = document.getElementById('buy-btn');
    if (!btn) return;

    if (song.type === 'one-of-a-kind' && soldOut) {
      btn.textContent = 'SOLD OUT';
      btn.disabled = true;
      return;
    }
    if (isFree) {
      btn.textContent = '無料DL';
      btn.disabled = false;
      if (url) {
        btn.onclick = () => window.open(url, '_blank', 'noopener');
      } else {
        // サイトから直接ダウンロード
        btn.onclick = () => {
          const a = document.createElement('a');
          a.href = song.audio;
          a.download = song.title + '.mp3';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        };
      }
      return;
    }
    if (url) {
      btn.textContent = 'BOOTHで購入 →';
      btn.disabled = false;
      btn.onclick = () => window.open(url, '_blank', 'noopener');
    } else {
      btn.textContent = '準備中';
      btn.disabled = true;
    }
  }

  async function initBuy() {
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem('fumiha_products')) || {}; } catch {}
    applyBuySettings(saved);
    try {
      const res = await fetch('/.netlify/functions/products');
      if (res.ok) {
        const data = await res.json();
        if (Object.keys(data).length > 0) {
          localStorage.setItem('fumiha_products', JSON.stringify(data));
          applyBuySettings(data);
        }
      }
    } catch {}
  }
  initBuy();
})();
</script>
</body>
</html>
