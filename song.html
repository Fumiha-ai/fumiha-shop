<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">BGM 詳細 — ふみはBGM</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3250490594221547"
     crossorigin="anonymous"></script>
<!-- OGP (JS で上書き) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="ふみはBGM">
<meta id="og-title"       property="og:title"       content="ふみはBGM">
<meta id="og-description" property="og:description"  content="ロイヤリティフリーBGM販売">
<meta id="og-image"       property="og:image"        content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #4A6CF7;
    --accent-light: #EEF1FE;
    --bg: #F7F8FC;
    --bg2: #FFFFFF;
    --border: #E4E7F0;
    --text: #1A1C2A;
    --muted: #6B7080;
    --radius: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ── Nav ── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--accent); }
  .nav-brand {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    color: var(--text);
    text-decoration: none;
  }

  /* ── Hero ── */
  .hero {
    max-width: 960px;
    margin: 48px auto 0;
    padding: 0 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: start;
  }
  @media(max-width:720px) {
    .hero { grid-template-columns: 1fr; gap: 28px; padding: 0 20px; }
  }

  /* Jacket */
  .jacket-wrap {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 16/9;
    background: var(--jacket-color, #2a2d3e);
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  }
  .jacket-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .jacket-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    opacity: 0.55;
  }
  .jacket-wrap img.loaded + .jacket-placeholder { display: none; }

  /* Info */
  .info { display: flex; flex-direction: column; gap: 0; }

  .sale-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
    width: fit-content;
  }
  .sale-badge.one-of-a-kind { background:#FFF3E0; color:#C25F00; border:1px solid #FFD59E; }
  .sale-badge.regular        { background:var(--accent-light); color:var(--accent); border:1px solid #C5CEFB; }
  .sale-badge.free           { background:#EDFAF3; color:#1A7A47; border:1px solid #9DE3BF; }

  .song-title {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(28px, 5vw, 46px);
    line-height: 1.1;
    margin-bottom: 14px;
  }
  .song-desc {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 24px;
  }

  /* Player */
  .player-box {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 40px;
    margin-bottom: 14px;
    cursor: pointer;
  }
  .wave-bar {
    flex: 1;
    border-radius: 3px;
    background: var(--border);
    transition: background 0.15s, height 0.15s;
  }
  .player-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .play-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
    transition: transform 0.15s, opacity 0.15s;
  }
  .play-btn:hover { transform: scale(1.1); opacity: 0.9; }

  .restart-btn {
    width: 36px; height: 36px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--bg2);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
    transition: border-color 0.15s, color 0.15s, transform 0.15s;
  }
  .restart-btn:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.08); }
  .player-time { font-size: 12px; color: var(--muted); flex: 1; }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
  }
  .volume-icon { font-size: 14px; cursor: pointer; width: 20px; text-align: center; flex-shrink: 0; }
  .volume-slider {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 4px;
    border-radius: 999px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .volume-slider::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
  }
  .volume-num { font-size: 11px; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0; }
  audio { display: none; }

  /* License pills */
  .license-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .lic-pill {
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 12px;
    background: var(--bg);
  }
  .tag-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }
  .tag-pill {
    font-size: 11px;
    color: #1E7A34;
    background: #F0FFF4;
    border: 1px solid #B7EBC4;
    border-radius: 999px;
    padding: 3px 12px;
  }

  /* Price + Buy */
  .buy-area {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 20px;
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
  }
  .price {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 32px;
    line-height: 1;
  }
  .price span { font-size: 14px; font-family: 'Noto Sans JP', sans-serif; color: var(--muted); }
  .buy-btn {
    padding: 13px 28px;
    border-radius: 999px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    letter-spacing: 0.5px;
    background: var(--accent);
    color: #fff;
    transition: transform 0.15s, opacity 0.15s;
    white-space: nowrap;
  }
  .buy-btn:hover { opacity: 0.85; transform: scale(1.03); }
  .buy-btn.free-btn { background: #1A7A47; }
  .buy-btn:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; transform: none; }
  .sold-out-badge {
    font-size: 12px;
    font-weight: 700;
    color: #D94545;
    border: 1px solid #D94545;
    border-radius: 6px;
    padding: 4px 10px;
  }

  /* ── License table ── */
  .detail-section {
    max-width: 960px;
    margin: 56px auto 0;
    padding: 0 40px;
  }
  @media(max-width:720px) { .detail-section { padding: 0 20px; } }

  .section-title {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 20px;
    margin-bottom: 18px;
  }
  .license-list {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .license-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .license-item:last-child { border-bottom: none; }
  .ok { color: #2BA05C; font-weight: 700; font-size: 16px; flex-shrink: 0; }
  .ng { color: #D94545; font-weight: 700; font-size: 16px; flex-shrink: 0; }

  /* ── Other songs ── */
  .other-section {
    max-width: 960px;
    margin: 56px auto 80px;
    padding: 0 40px;
  }
  @media(max-width:720px) { .other-section { padding: 0 20px; } }

  .other-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }
  .other-card {
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.2s, box-shadow 0.2s;
    display: block;
  }
  .other-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(74,108,247,0.12); }
  .other-jacket {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
  }
  .other-jacket img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }
  .other-card:hover .other-jacket img { transform: scale(1.05); }
  .other-jacket .jacket-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    opacity: 0.6;
  }
  .other-jacket img.loaded + .jacket-placeholder { display: none; }
  .other-body { padding: 14px; }
  .other-title { font-family: 'Noto Sans JP', sans-serif; font-size: 15px; margin-bottom: 4px; }
  .other-type {
    font-size: 11px;
    font-weight: 700;
    border-radius: 4px;
    padding: 2px 8px;
    display: inline-block;
  }
  .other-type.one-of-a-kind { background:#FFF3E0; color:#C25F00; }
  .other-type.regular        { background:var(--accent-light); color:var(--accent); }
  .other-type.free           { background:#EDFAF3; color:#1A7A47; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }

  /* ── Error ── */
  .error-wrap {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 40px;
  }
  .error-wrap h2 { font-family: 'Noto Sans JP', sans-serif; font-size: 28px; }
  .error-wrap p  { color: var(--muted); }

  @keyframes floatUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  .hero { animation: floatUp 0.4s ease both; }

  /* ── 広告モーダル ── */
  .ad-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    animation: fadeIn 0.2s ease;
  }
  .ad-modal-overlay.hidden { display: none; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .ad-modal-skip {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 6px;
    height: 16px;
    text-align: center;
  }
  .ad-modal-box {
    position: relative;
    max-width: 720px;
    width: 100%;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .ad-modal-close {
    position: absolute;
    top: -13px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.55);
    background: rgba(30,30,30,0.82);
    color: rgba(255,255,255,0.8);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .ad-modal-close.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .ad-modal-content {
    width: 100%;
    display: flex;
    justify-content: center;
  }
  .ad-modal-content img,
  .ad-modal-content a img { max-width: 100%; display: block; }
  .ad-modal-note {
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-top: 8px;
  }

  /* ── YouTube モーダル ── */
  .yt-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .yt-modal-overlay.open { display: flex; }
  .yt-modal-box {
    position: relative;
    width: min(860px, 94vw);
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .yt-modal-box iframe {
    display: block;
    width: 100%;
    aspect-ratio: 16 / 9;
    border: none;
  }
  .yt-modal-close {
    position: absolute;
    top: -38px;
    right: 0;
    background: none;
    border: none;
    color: #fff;
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
    opacity: 0.8;
    padding: 4px 8px;
  }
  .yt-modal-close:hover { opacity: 1; }

  /* ジャケット内サムネイル＋再生ボタン */
  .jacket-yt-thumb {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }
  .jacket-yt-play {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: rgba(0,0,0,0.15);
    transition: background 0.2s;
  }
  .jacket-yt-play:hover { background: rgba(0,0,0,0.35); }
  .jacket-yt-play svg { width: 72px; height: 72px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }
</style>
</head>
<body>

<!-- 広告モーダル -->
<div class="ad-modal-overlay hidden" id="ad-modal">
  <div class="ad-modal-skip" id="ad-modal-skip"></div>
  <div class="ad-modal-box">
    <button class="ad-modal-close" id="ad-modal-close">✕</button>
    <div class="ad-modal-content" id="ad-modal-ad"></div>
  </div>
  <div class="ad-modal-note">広告を閉じるとダウンロードが始まります</div>
</div>

<!-- Nav -->
<nav class="nav">
  <a class="back-btn" href="bgm-shop.html">← 曲一覧へ戻る</a>
  <a class="nav-brand" href="bgm-shop.html">ふみはBGM</a>
</nav>

<!-- 動的コンテンツ -->
<div id="main-content"></div>

<footer>
  <p>© 2025 ふみはBGM — All BGM produced with Suno AI</p>
  <p style="margin-top:6px">お問い合わせは <a href="https://docs.google.com/forms/d/e/1FAIpQLScPMfiUxlfrVKlkdxMMS0d8RKatn8U9_UpC2KYqzRJHvBJyNg/viewform?usp=header" target="_blank" rel="noopener" style="color:var(--accent)">こちらのGoogleフォーム</a> よりどうぞ</p>
</footer>

<!-- YouTube モーダル -->
<div class="yt-modal-overlay" id="yt-modal" onclick="closeYtModal(event)">
  <div class="yt-modal-box">
    <button class="yt-modal-close" onclick="closeYtModal()">✕</button>
    <iframe id="yt-modal-iframe" src="" title="" frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>
  </div>
</div>

<script src="songs.js"></script>
<script>
  // YouTube URLからビデオIDを取得
  function getYouTubeId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtu\.be\/|[?&]v=)([\w-]{11})/);
    return m ? m[1] : null;
  }

  // YouTubeモーダル
  function openYtModal(ytId, title) {
    document.getElementById('yt-modal-iframe').src =
      `https://www.youtube.com/embed/${ytId}?autoplay=1`;
    document.getElementById('yt-modal-iframe').title = title;
    document.getElementById('yt-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeYtModal(e) {
    if (e && e.target !== document.getElementById('yt-modal')) return;
    document.getElementById('yt-modal-iframe').src = '';
    document.getElementById('yt-modal').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeYtModal();
  });

(function () {
  const params = new URLSearchParams(location.search);
  const id     = params.get('id');
  const song   = SONGS.find(s => s.id === id);
  const main   = document.getElementById('main-content');

  /* ── 曲が見つからない ── */
  if (!song) {
    main.innerHTML = `
      <div class="error-wrap">
        <h2>曲が見つかりません</h2>
        <p>URLが正しいかご確認ください。</p>
        <a href="bgm-shop.html" style="color:var(--accent);font-weight:700;">← 曲一覧へ戻る</a>
      </div>`;
    return;
  }

  /* ── ページタイトル / OGP ── */
  document.getElementById('page-title').textContent       = `${song.title} — ふみはBGM`;
  document.getElementById('og-title').content             = `${song.title} — ふみはBGM`;
  document.getElementById('og-description').content       = song.description;
  if (song.jacket) document.getElementById('og-image').content = song.jacket;

  /* ── バッジテキスト ── */
  const BADGE = {
    'one-of-a-kind': '限定1点',
    'regular':        '通常販売',
    'free':           'フリー · 無料DL',
  };
  const isFree  = song.type === 'free';
  const priceHtml = isFree
    ? '¥0 <span>/ 無料</span>'
    : `¥${song.price.toLocaleString()} <span>/ 1曲</span>`;
  const buyClass = isFree ? 'buy-btn free-btn' : 'buy-btn';
  const buyText  = isFree ? '無料DL' : '準備中';
  const tagPillsHtml = (song.tags || []).length
    ? `<div class="tag-pills">${(song.tags).map(t => `<span class="tag-pill">${t}</span>`).join('')}</div>`
    : '';

  /* ── メインHTML ── */
  const ytId = getYouTubeId(song.youtube);
  const safeTitle = song.title.replace(/'/g, "\\'");
  const jacketHtml = ytId
    ? `<div class="jacket-wrap" style="--jacket-color:${song.jacketGradient}" onclick="openYtModal('${ytId}','${safeTitle}')">
        <img class="jacket-yt-thumb" src="https://img.youtube.com/vi/${ytId}/maxresdefault.jpg" alt="${song.title}" onerror="this.src='https://img.youtube.com/vi/${ytId}/hqdefault.jpg'">
        <div class="jacket-yt-play">
          <svg viewBox="0 0 68 48" xmlns="http://www.w3.org/2000/svg">
            <path d="M66.5 7.7a8.5 8.5 0 0 0-6-6C56 0 34 0 34 0S12 0 7.5 1.7a8.5 8.5 0 0 0-6 6C0 12.1 0 24 0 24s0 11.9 1.5 16.3a8.5 8.5 0 0 0 6 6C12 48 34 48 34 48s22 0 26.5-1.7a8.5 8.5 0 0 0 6-6C68 35.9 68 24 68 24s0-11.9-1.5-16.3z" fill="#ff0000"/>
            <path d="M27 34l18-10-18-10v20z" fill="#fff"/>
          </svg>
        </div>
      </div>`
    : `<div class="jacket-wrap" style="--jacket-color:${song.jacketGradient}">
        <img src="${song.jacket}" alt="${song.title}" onload="this.classList.add('loaded')" onerror="this.style.display='none'">
        <div class="jacket-placeholder">${song.jacketEmoji}</div>
      </div>`;
  main.innerHTML = `
    <div class="hero">
      <!-- Jacket -->
      ${jacketHtml}

      <!-- Info -->
      <div class="info">
        <div class="sale-badge ${song.type}">${BADGE[song.type]}</div>
        <div class="song-title">${song.title}</div>
        <div class="song-desc">${song.description}</div>

        <!-- Player -->
        <div class="player-box">
          <div class="waveform" id="wf" onclick="togglePlay()"></div>
          <div class="player-controls">
            <button class="restart-btn" onclick="restartPlay()" title="最初から再生">⏮</button>
            <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
            <div class="player-time" id="player-time">${song.duration}</div>
          </div>
          <div class="volume-row">
            <span class="volume-icon" id="vol-icon" onclick="toggleMute()">🔊</span>
            <input class="volume-slider" id="vol-slider" type="range" min="0" max="100" value="30"
              oninput="setVolume()">
            <span class="volume-num" id="vol-num">30</span>
          </div>
        </div>

        <!-- Tags -->
        ${tagPillsHtml}

        <!-- Buy -->
        <div class="buy-area">
          <div class="price">${priceHtml}</div>
          <button class="${buyClass}" id="buy-btn" disabled>${buyText}</button>
        </div>

        <audio id="player" src="${song.audio}"></audio>
      </div>
    </div>

    <!-- License section -->
    <div class="detail-section">
      <div class="section-title">ライセンス</div>
      ${song.type === 'free' ? `
        <div style="background:#F3FBF7; border:1.5px solid #9DE3BF; border-radius:12px; padding:20px 24px;">
          <div style="font-size:11px; font-weight:700; background:#EDFAF3; color:#1A7A47; border-radius:999px; padding:2px 12px; display:inline-block; margin-bottom:12px;">フリー</div>
          <div style="font-size:15px; font-weight:700; color:#1A1C2A; margin-bottom:8px;">フリーライセンス</div>
          <div style="font-size:14px; color:#6B7080; line-height:1.8;">無償で利用可能。個人・商用問わず、クレジット表記は任意で使用できます。</div>
        </div>
      ` : song.type === 'regular' ? `
        <div style="background:#F5F7FF; border:1.5px solid #C5CEFB; border-radius:12px; padding:20px 24px;">
          <div style="font-size:11px; font-weight:700; background:#EEF1FE; color:#4A6CF7; border-radius:999px; padding:2px 12px; display:inline-block; margin-bottom:12px;">通常</div>
          <div style="font-size:15px; font-weight:700; color:#1A1C2A; margin-bottom:8px;">通常ライセンス</div>
          <div style="font-size:14px; color:#6B7080; line-height:1.8;">有償。購入者は非独占的・非譲渡的な利用権を得ます。複数プロジェクトで使用可能です。</div>
        </div>
      ` : `
        <div style="background:#FFFAF4; border:1.5px solid #FFB74D; border-radius:12px; padding:20px 24px;">
          <div style="font-size:11px; font-weight:700; background:#FFF3E0; color:#E65100; border-radius:999px; padding:2px 12px; display:inline-block; margin-bottom:12px;">限定1点</div>
          <div style="font-size:15px; font-weight:700; color:#1A1C2A; margin-bottom:8px;">限定1点ライセンス</div>
          <div style="font-size:14px; color:#6B7080; line-height:1.8;">有償・独占販売。購入後は当該楽曲の販売を終了し、購入者のみが使用できます。</div>
        </div>
      `}
    </div>`;

  /* ── 他の曲 ── */
  const others = SONGS.filter(s => s.id !== song.id);
  if (others.length > 0) {
    const TYPE_LABEL = { 'one-of-a-kind': '限定一点', 'regular': '通常販売', 'free': '無料' };
    const cards = others.map(s => `
      <a class="other-card" href="song.html?id=${s.id}">
        <div class="other-jacket" style="background:${s.jacketGradient}">
          <img src="${s.jacket}" alt="${s.title}" onload="this.classList.add('loaded')" onerror="this.style.display='none'">
          <div class="jacket-placeholder">${s.jacketEmoji}</div>
        </div>
        <div class="other-body">
          <div class="other-title">${s.title}</div>
          <span class="other-type ${s.type}">${TYPE_LABEL[s.type]}</span>
        </div>
      </a>`).join('');

    const section = document.createElement('div');
    section.className = 'other-section';
    section.innerHTML = `<div class="section-title" style="margin-bottom:18px">他の曲を見る</div>
      <div class="other-grid">${cards}</div>`;
    main.appendChild(section);
  }

  /* ── Player logic ── */
  const audio   = document.getElementById('player');
  const playBtn = document.getElementById('play-btn');
  const timeEl  = document.getElementById('player-time');
  const wf      = document.getElementById('wf');

  // Waveform bars
  for (let i = 0; i < 48; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    const h = 8 + Math.random() * 24;
    bar.style.height = h + 'px';
    bar.dataset.h = h;
    wf.appendChild(bar);
  }

  let animTimer = null;
  function animateBars(playing) {
    if (playing) {
      clearInterval(animTimer);
      animTimer = setInterval(() => {
        wf.querySelectorAll('.wave-bar').forEach(b => {
          b.style.height = (8 + Math.random() * 24) + 'px';
          b.style.background = 'var(--accent)';
        });
      }, 120);
    } else {
      clearInterval(animTimer);
      wf.querySelectorAll('.wave-bar').forEach(b => {
        b.style.height = (b.dataset.h || 8) + 'px';
        b.style.background = 'var(--border)';
      });
    }
  }

  function fmtTime(sec) {
    if (!sec || isNaN(sec)) return '--:--';
    return Math.floor(sec / 60) + ':' + String(Math.floor(sec % 60)).padStart(2, '0');
  }

  audio.addEventListener('loadedmetadata', () => {
    timeEl.textContent = fmtTime(audio.duration);
  });
  audio.addEventListener('timeupdate', () => {
    if (audio.duration) timeEl.textContent = fmtTime(audio.duration - audio.currentTime);
  });
  audio.addEventListener('ended', () => {
    playBtn.textContent = '▶';
    animateBars(false);
    audio.currentTime = 0;
    if (audio.duration) timeEl.textContent = fmtTime(audio.duration);
  });

  window.togglePlay = function () {
    if (playBtn.textContent === '▶') {
      playBtn.textContent = '⏸';
      audio.play();
      animateBars(true);
    } else {
      playBtn.textContent = '▶';
      audio.pause();
      animateBars(false);
    }
  };

  window.restartPlay = function () {
    audio.currentTime = 0;
    audio.play();
    playBtn.textContent = '⏸';
    animateBars(true);
  };

  // Volume
  const volSlider = document.getElementById('vol-slider');
  const volIcon   = document.getElementById('vol-icon');
  const volNum    = document.getElementById('vol-num');
  audio.volume = 0.3;
  volSlider.style.background = 'linear-gradient(to right, var(--accent) 30%, var(--border) 30%)';

  window.setVolume = function () {
    const val = parseInt(volSlider.value);
    audio.volume = val / 100;
    volNum.textContent = val;
    volIcon.textContent = val === 0 ? '🔇' : val < 50 ? '🔉' : '🔊';
    volSlider.style.background =
      `linear-gradient(to right, var(--accent) ${val}%, var(--border) ${val}%)`;
  };

  window.toggleMute = function () {
    if (audio.volume > 0) {
      volSlider.dataset.prev = volSlider.value;
      audio.volume = 0;
      volSlider.value = 0;
      volIcon.textContent = '🔇';
      volNum.textContent = '0';
      volSlider.style.background = 'linear-gradient(to right, var(--accent) 0%, var(--border) 0%)';
    } else {
      const prev = parseInt(volSlider.dataset.prev) || 50;
      audio.volume = prev / 100;
      volSlider.value = prev;
      volNum.textContent = prev;
      volIcon.textContent = prev < 50 ? '🔉' : '🔊';
      volSlider.style.background =
        `linear-gradient(to right, var(--accent) ${prev}%, var(--border) ${prev}%)`;
    }
  };

  /* ── 広告モーダル ── */
  let _adCache = null;
  let _pendingHref = null;
  let _pendingFilename = null;
  const adModal      = document.getElementById('ad-modal');
  const adModalClose = document.getElementById('ad-modal-close');

  async function loadAds() {
    try {
      const stored = JSON.parse(localStorage.getItem('fumiha_ads'));
      if (Array.isArray(stored)) _adCache = stored;
    } catch {}
    try {
      const res = await fetch('/api/ads');
      if (res.ok) {
        const data = await res.json();
        if (Array.isArray(data) && data.length > 0) {
          localStorage.setItem('fumiha_ads', JSON.stringify(data));
          _adCache = data;
        }
      }
    } catch {}
  }

  function getRandomAd() {
    if (!_adCache) return null;
    const enabled = _adCache.filter(a => a.enabled);
    if (!enabled.length) return null;
    return enabled[Math.floor(Math.random() * enabled.length)];
  }

  const AD_SKIP_SEC = 5;
  let _skipTimer = null;

  function showAdModal() {
    const ad = getRandomAd();
    if (!ad) return false;
    document.getElementById('ad-modal-ad').innerHTML = ad.html;
    adModalClose.classList.remove('visible');
    const skipEl = document.getElementById('ad-modal-skip');
    skipEl.textContent = `${AD_SKIP_SEC}秒後にスキップ`;
    let remaining = AD_SKIP_SEC;
    clearInterval(_skipTimer);
    _skipTimer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(_skipTimer);
        skipEl.textContent = '';
        adModalClose.classList.add('visible');
      } else {
        skipEl.textContent = `${remaining}秒後にスキップ`;
      }
    }, 1000);
    adModal.classList.remove('hidden');
    return true;
  }
  function closeAdModal() {
    clearInterval(_skipTimer);
    adModal.classList.add('hidden');
    if (_pendingHref) {
      const a = document.createElement('a');
      a.href     = _pendingHref;
      a.download = _pendingFilename || '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      _pendingHref = null;
      _pendingFilename = null;
    }
  }
  adModalClose.addEventListener('click', closeAdModal);
  adModal.addEventListener('click', e => { if (e.target === adModal && adModalClose.classList.contains('visible')) closeAdModal(); });
  loadAds();

  /* ── 購入ボタン設定（localStorage + Netlify function） ── */
  function applyBuySettings(saved) {
    const data    = saved[song.id] || {};
    const url     = data.boothUrl || '';
    const soldOut = data.soldOut  || false;
    const btn     = document.getElementById('buy-btn');
    if (!btn) return;

    if (song.type === 'one-of-a-kind' && soldOut) {
      btn.textContent = 'SOLD OUT';
      btn.disabled = true;
      return;
    }
    if (isFree) {
      // <button> を本物の <a download> に差し替え
      let el = document.getElementById('buy-btn');
      if (el && el.tagName !== 'A') {
        const a = document.createElement('a');
        a.id        = el.id;
        a.className = el.className;
        a.textContent = '無料DL';
        a.addEventListener('click', (e) => {
          e.preventDefault();
          _pendingHref     = a.href;
          _pendingFilename = a.getAttribute('download') || '';
          if (!showAdModal()) {
            const dl = document.createElement('a');
            dl.href     = _pendingHref;
            dl.download = _pendingFilename;
            document.body.appendChild(dl);
            dl.click();
            document.body.removeChild(dl);
            _pendingHref = null;
            _pendingFilename = null;
          }
        });
        el.replaceWith(a);
        el = a;
      }
      if (url) {
        el.href   = url;
        el.target = '_blank';
        el.rel    = 'noopener';
        el.removeAttribute('download');
      } else {
        el.href = song.audio;
        el.setAttribute('download', song.title + '.mp3');
        el.removeAttribute('target');
      }
      return;
    }
    if (url) {
      btn.textContent = 'BOOTHで購入 →';
      btn.disabled = false;
      btn.onclick = () => window.open(url, '_blank', 'noopener');
    } else {
      btn.textContent = '準備中';
      btn.disabled = true;
    }
  }

  async function initBuy() {
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem('fumiha_products')) || {}; } catch {}
    applyBuySettings(saved);
    try {
      const res = await fetch('/api/products');
      if (res.ok) {
        const data = await res.json();
        if (Object.keys(data).length > 0) {
          localStorage.setItem('fumiha_products', JSON.stringify(data));
          applyBuySettings(data);
        }
      }
    } catch {}
  }
  initBuy();
})();
</script>
</body>
</html>
